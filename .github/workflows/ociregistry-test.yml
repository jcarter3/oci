name: "oci: test"

on:
  pull_request:
    paths:
      - "./**"
      - ".github/workflows/oci-test.yml"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: oci/go.mod
          cache-dependency-path: oci/go.sum

      - name: Run tests
        run: go test -race -count=1 ./...
